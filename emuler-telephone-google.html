<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BIOSPORTS – Aperçu téléphone</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .phone-frame {
      width: 375px;
      height: 812px;
      max-width: 100%;
      max-height: 90vh;
      background: #000;
      border-radius: 44px;
      padding: 12px;
      box-shadow:
        0 0 0 3px #333,
        0 0 0 12px #1a1a1a,
        0 25px 50px -12px rgba(0,0,0,0.5),
        inset 0 0 6px rgba(255,255,255,0.05);
      position: relative;
    }
    .phone-frame::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      height: 28px;
      background: #000;
      border-radius: 0 0 20px 20px;
      z-index: 10;
    }
    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 34px;
      overflow: hidden;
      background: #0d0d0d;
    }
    .phone-screen iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .hint {
      text-align: center;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      margin-top: 20px;
      max-width: 375px;
    }
    .hint a { color: #C9A227; }
    .hint .url { font-family: monospace; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <div>
    <div class="phone-frame">
      <div class="phone-screen">
        <iframe
          id="app"
          src="http://localhost:8082"
          title="BIOSPORTS"
        ></iframe>
      </div>
    </div>
    <p class="hint">
      L’app s’affiche comme sur un téléphone.<br>
      Si la page est vide, lancez d’abord <strong>npx expo start --web --port 8082</strong> dans le dossier du projet.<br>
      <span class="url">http://localhost:8082</span>
    </p>
  </div>
</body>
</html>
